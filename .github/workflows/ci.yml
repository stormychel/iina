name: CI

on:
  push:
      branches: [develop]
  pull_request:
      branches: [develop]

jobs:
  build:
    strategy:
      matrix:
        include:
          - xcode: "26.0"
            deployment_target: ""
    runs-on:  macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: ./other/download_libs.sh $DOWNLOAD_LIBS_ARGS
        env:
          DOWNLOAD_LIBS_ARGS: ${{ github.event_name == 'pull_request' && '--skip-plugins' || '' }}

      - name: Build
        run: xcodebuild -project iina.xcodeproj ONLY_ACTIVE_ARCH=NO -scheme iina -configuration Nightly ${{ matrix.deployment_target }}
        env:
          DEVELOPER_DIR: /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer

      - name: Archive
        run: tar cvJf ~/iina.tar.xz -C /Users/runner/Library/Developer/Xcode/DerivedData/iina-csbkugdtxazzqogjnydbothqrvib/Build/Products/Nightly IINA.app 

      - name: Save artifacts
        uses: actions/upload-artifact@v6
        with:
          name: IINA
          path: ~/iina.tar.xz
